<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>XI F4 - SMAN 2 Enok</title>
    <style>
        /* ===== RESET ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0c2340, #1a4a7a, #2e6db4);
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* ===== EFK BINTANG (animasi background) ===== */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background:
                radial-gradient(2px 2px at 20px 30px, rgba(255,255,255,0.3), transparent),
                radial-gradient(2px 2px at 40px 70px, rgba(255,255,255,0.2), transparent),
                radial-gradient(2px 2px at 50px 160px, rgba(255,255,255,0.4), transparent),
                radial-gradient(2px 2px at 90px 40px, rgba(255,255,255,0.3), transparent),
                radial-gradient(2px 2px at 130px 80px, rgba(255,255,255,0.2), transparent),
                radial-gradient(2px 2px at 160px 30px, rgba(255,255,255,0.4), transparent);
            background-size: 200px 200px;
            animation: bintang 20s linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes bintang {
            0% { transform: translateY(0); }
            100% { transform: translateY(-200px); }
        }

        /* ===== KARTU UTAMA ===== */
        .container {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 50px 60px;
            max-width: 750px;
            width: 100%;
            text-align: center;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.15);
            position: relative;
            z-index: 1;
        }

        /* ===== LOGO ===== */
        .logo {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            margin-bottom: 20px;
            transition: 0.3s;
        }

        .logo:hover {
            transform: scale(1.05);
            border-color: rgba(255, 255, 255, 0.6);
        }

        /* ===== TEKS ===== */
        .judul {
            color: white;
            font-size: 36px;
            font-weight: 800;
            letter-spacing: 2px;
            text-shadow: 0 2px 20px rgba(0, 0, 0, 0.3);
        }

        .subjudul {
            color: rgba(255, 255, 255, 0.85);
            font-size: 22px;
            font-weight: 300;
            letter-spacing: 6px;
            margin-top: 4px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
        }

        .garis {
            width: 80px;
            height: 3px;
            background: linear-gradient(90deg, transparent, #fdcb6e, transparent);
            margin: 18px auto;
            border-radius: 10px;
        }

        /* ===== TOMBOL ===== */
        .tombol-group {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
            margin-top: 30px;
        }

        .tombol {
            padding: 16px 20px;
            border: none;
            border-radius: 16px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.12);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            text-decoration: none;
        }

        .tombol:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.25);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.3);
            border-color: rgba(255, 255, 255, 0.4);
        }

        .tombol:active {
            transform: translateY(-2px) scale(0.97);
        }

        /* Warna spesifik tombol */
        .tombol.anggota {
            grid-column: span 2;
            background: rgba(253, 203, 110, 0.2);
            border-color: rgba(253, 203, 110, 0.3);
            font-size: 20px;
            padding: 18px;
        }

        .tombol.anggota:hover {
            background: rgba(253, 203, 110, 0.35);
            border-color: #fdcb6e;
        }

        .tombol.cowok:hover {
            background: rgba(74, 144, 217, 0.35);
            border-color: #4a90d9;
        }

        .tombol.cewek:hover {
            background: rgba(231, 76, 148, 0.35);
            border-color: #e74c94;
        }

        .tombol.bareng:hover {
            background: rgba(46, 204, 113, 0.35);
            border-color: #2ecc71;
        }

        /* Icon di tombol */
        .icon {
            font-size: 24px;
        }

        /* ===== FOOTER ===== */
        .footer {
            margin-top: 30px;
            color: rgba(255, 255, 255, 0.3);
            font-size: 13px;
            letter-spacing: 1px;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 600px) {
            .container {
                padding: 30px 25px;
                border-radius: 28px;
            }

            .logo {
                width: 130px;
                height: 130px;
            }

            .judul {
                font-size: 26px;
            }

            .subjudul {
                font-size: 16px;
                letter-spacing: 3px;
            }

            .tombol-group {
                grid-template-columns: 1fr 1fr;
                gap: 10px;
            }

            .tombol {
                font-size: 15px;
                padding: 14px 12px;
            }

            .tombol.anggota {
                grid-column: span 2;
                font-size: 17px;
                padding: 16px;
            }

            .icon {
                font-size: 20px;
            }
        }

        @media (max-width: 400px) {
            .tombol-group {
                grid-template-columns: 1fr;
            }

            .tombol.anggota {
                grid-column: span 1;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- ===== LOGO ===== -->
        <img src="logoutama.jpg" alt="Logo Kelas" class="logo" />

        <!-- ===== TEKS ===== -->
        <h1 class="judul">SMAN 2 ENOK</h1>
        <p class="subjudul">XI F4</p>
        <div class="garis"></div>

        <!-- ===== TOMBOL ===== -->
        <div class="tombol-group">
            <!-- Anggota (lebar 2 kolom) -->
            <a href="anggota.html" class="tombol anggota">
                <span class="icon">👥</span> Anggota
            </a>

            <!-- Cowok -->
            <a href="cowok.html" class="tombol cowok">
                <span class="icon">👦</span> Cowok
            </a>

            <!-- Cewek -->
            <a href="cewek.html" class="tombol cewek">
                <span class="icon">👧</span> Cewek
            </a>

            <!-- Bareng -->
            <a href="bareng.html" class="tombol bareng">
                <span class="icon">👫</span> Bareng
            </a>
        </div>

        <!-- ===== FOOTER ===== -->
        <p class="footer">✨ Kelas XI F4 ✨</p>
    </div>

</body>
</html>
