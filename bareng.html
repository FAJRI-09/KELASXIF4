<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>Bareng - XI F4</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0c2340, #1a4a7a, #2e6db4);
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background:
                radial-gradient(2px 2px at 20px 30px, rgba(255,255,255,0.3), transparent),
                radial-gradient(2px 2px at 40px 70px, rgba(255,255,255,0.2), transparent),
                radial-gradient(2px 2px at 50px 160px, rgba(255,255,255,0.4), transparent),
                radial-gradient(2px 2px at 90px 40px, rgba(255,255,255,0.3), transparent),
                radial-gradient(2px 2px at 130px 80px, rgba(255,255,255,0.2), transparent),
                radial-gradient(2px 2px at 160px 30px, rgba(255,255,255,0.4), transparent);
            background-size: 200px 200px;
            animation: bintang 20s linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes bintang {
            0% { transform: translateY(0); }
            100% { transform: translateY(-200px); }
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 40px 35px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.5);
            position: relative;
            z-index: 1;
            text-align: center;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .header h1 {
            color: white;
            font-size: clamp(24px, 4vw, 36px);
            font-weight: 800;
        }

        .header h1 span {
            color: #a29bfe;
        }

        .btn-kembali {
            padding: 10px 24px;
            background: rgba(255, 255, 255, 0.12);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-kembali:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-2px);
        }

        .tombol-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        .tombol {
            padding: 40px 20px;
            border: none;
            border-radius: 20px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            background: rgba(255, 255, 255, 0.08);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        .tombol:hover {
            transform: translateY(-8px);
            background: rgba(255, 255, 255, 0.18);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .tombol .icon {
            font-size: 50px;
        }

        .tombol .label {
            font-size: 18px;
        }

        .tombol.foto:hover {
            background: rgba(162, 155, 254, 0.25);
            border-color: #a29bfe;
        }

        .tombol.video:hover {
            background: rgba(162, 155, 254, 0.25);
            border-color: #a29bfe;
        }

        .footer {
            margin-top: 30px;
            color: rgba(255, 255, 255, 0.3);
            font-size: 13px;
            letter-spacing: 1px;
        }

        .footer span {
            color: #a29bfe;
        }

        @media (max-width: 500px) {
            .container { padding: 28px 18px; border-radius: 28px; }
            .header { flex-direction: column; text-align: center; }
            .tombol-group { grid-template-columns: 1fr; gap: 15px; }
            .tombol { padding: 30px 20px; }
            .tombol .icon { font-size: 40px; }
        }

        @media (max-width: 400px) {
            .container { padding: 20px 14px; border-radius: 20px; }
            .tombol { padding: 24px 16px; }
            .tombol .icon { font-size: 34px; }
            .tombol .label { font-size: 16px; }
        }

        @media (max-height: 500px) and (orientation: landscape) {
            .container { padding: 18px 25px; border-radius: 24px; }
            .header { margin-bottom: 15px; }
            .header h1 { font-size: 20px; }
            .tombol-group { grid-template-columns: 1fr 1fr; gap: 12px; }
            .tombol { padding: 20px 16px; flex-direction: row; gap: 10px; }
            .tombol .icon { font-size: 28px; }
            .tombol .label { font-size: 14px; }
            .footer { margin-top: 15px; font-size: 11px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>👫 <span>Bareng</span> XI F4</h1>
            <a href="index.html" class="btn-kembali">⬅ Kembali</a>
        </div>

        <div class="tombol-group">
            <a href="bareng-foto.html" class="tombol foto">
                <span class="icon">📸</span>
                <span class="label">Foto</span>
            </a>
            <a href="bareng-video.html" class="tombol video">
                <span class="icon">🎥</span>
                <span class="label">Video</span>
            </a>
        </div>

        <p class="footer">✨ Pilih momen <span>bareng</span> XI F4 ✨</p>
    </div>

</body>
</html>
