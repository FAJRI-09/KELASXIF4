<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>Profil Siswa - XI F4</title>
    <style>
        /* ===== RESET ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0c2340, #1a4a7a, #2e6db4);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* ===== EFK BINTANG ===== */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background:
                radial-gradient(2px 2px at 20px 30px, rgba(255,255,255,0.3), transparent),
                radial-gradient(2px 2px at 40px 70px, rgba(255,255,255,0.2), transparent),
                radial-gradient(2px 2px at 50px 160px, rgba(255,255,255,0.4), transparent),
                radial-gradient(2px 2px at 90px 40px, rgba(255,255,255,0.3), transparent),
                radial-gradient(2px 2px at 130px 80px, rgba(255,255,255,0.2), transparent),
                radial-gradient(2px 2px at 160px 30px, rgba(255,255,255,0.4), transparent);
            background-size: 200px 200px;
            animation: bintang 20s linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes bintang {
            0% { transform: translateY(0); }
            100% { transform: translateY(-200px); }
        }

        /* ===== KONTENER ===== */
        .container {
            max-width: 500px;
            width: 100%;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 40px 35px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.5);
            position: relative;
            z-index: 1;
            text-align: center;
        }

        /* ===== TOMBOL KEMBALI ===== */
        .btn-kembali {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 24px;
            background: rgba(255, 255, 255, 0.12);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: 0.3s;
            margin-bottom: 25px;
        }

        .btn-kembali:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-2px);
        }

        /* ===== FOTO ===== */
        .foto-profil {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: 4px solid rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 70px;
            margin: 0 auto 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        /* ===== NAMA ===== */
        .nama-lengkap {
            color: white;
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 4px;
        }

        .nama-panggilan {
            color: rgba(255, 255, 255, 0.6);
            font-size: 16px;
            margin-bottom: 20px;
        }

        /* ===== GARIS ===== */
        .garis {
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, transparent, #fdcb6e, transparent);
            margin: 0 auto 20px;
            border-radius: 10px;
        }

        /* ===== INFO ===== */
        .info-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            text-align: left;
        }

        .info-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 18px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .info-item .label {
            color: rgba(255, 255, 255, 0.5);
            font-weight: 500;
            font-size: 14px;
        }

        .info-item .value {
            color: white;
            font-weight: 600;
            font-size: 14px;
        }

        .info-item .value.jk-putra {
            color: #4a90d9;
        }

        .info-item .value.jk-putri {
            color: #e74c94;
        }

        /* ===== MOTTO ===== */
        .motto-box {
            margin-top: 20px;
            padding: 16px 20px;
            background: rgba(253, 203, 110, 0.1);
            border-radius: 12px;
            border: 1px solid rgba(253, 203, 110, 0.15);
            text-align: center;
        }

        .motto-box .label {
            color: rgba(255, 255, 255, 0.4);
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .motto-box .motto {
            color: #fdcb6e;
            font-size: 18px;
            font-weight: 600;
            margin-top: 4px;
            font-style: italic;
        }

        /* ===== NOT FOUND ===== */
        .not-found {
            color: white;
            text-align: center;
            padding: 30px 0;
        }

        .not-found h2 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .not-found p {
            opacity: 0.6;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 600px) {
            .container {
                padding: 28px 20px;
                border-radius: 28px;
            }

            .foto-profil {
                width: 120px;
                height: 120px;
                font-size: 55px;
            }

            .nama-lengkap {
                font-size: 22px;
            }

            .info-item {
                padding: 10px 14px;
                flex-direction: column;
                gap: 4px;
                text-align: center;
            }

            .info-item .label {
                font-size: 12px;
            }

            .info-item .value {
                font-size: 15px;
            }

            .motto-box .motto {
                font-size: 16px;
            }
        }

        @media (max-width: 400px) {
            .container {
                padding: 20px 14px;
                border-radius: 20px;
            }

            .foto-profil {
                width: 100px;
                height: 100px;
                font-size: 45px;
            }

            .nama-lengkap {
                font-size: 19px;
            }

            .btn-kembali {
                font-size: 12px;
                padding: 8px 18px;
            }
        }

        /* Landscape HP */
        @media (max-height: 550px) and (orientation: landscape) {
            .container {
                padding: 20px 30px;
                border-radius: 24px;
                max-width: 450px;
            }

            .foto-profil {
                width: 80px;
                height: 80px;
                font-size: 35px;
                margin-bottom: 12px;
            }

            .nama-lengkap {
                font-size: 20px;
            }

            .nama-panggilan {
                font-size: 13px;
                margin-bottom: 12px;
            }

            .garis {
                margin-bottom: 12px;
            }

            .info-grid {
                gap: 8px;
            }

            .info-item {
                padding: 6px 12px;
                flex-direction: row;
                text-align: left;
            }

            .info-item .label {
                font-size: 11px;
            }

            .info-item .value {
                font-size: 12px;
            }

            .motto-box {
                margin-top: 12px;
                padding: 10px 16px;
            }

            .motto-box .motto {
                font-size: 14px;
            }

            .btn-kembali {
                margin-bottom: 12px;
                padding: 6px 16px;
                font-size: 12px;
            }
        }
    </style>
</head>

        // ===== AMBIL ID DARI URL =====
        function getParameter(nama) {
            const url = new URL(window.location.href);
            return url.searchParams.get(nama);
        }

        // ===== TAMPILKAN PROFIL =====
        function tampilkanProfil() {
            const id = parseInt(getParameter('id'));
            const container = document.getElementById('profilContainer');

            // Cari siswa berdasarkan ID
            const s = siswa.find(item => item.id === id);

            if (!s) {
                container.innerHTML = `
                    <a href="anggota.html" class="btn-kembali">⬅ Kembali ke Anggota</a>
                    <div class="not-found">
                        <h2>😕 Siswa Tidak Ditemukan</h2>
                        <p>ID: ${id} tidak ada dalam daftar</p>
                    </div>
                `;
                return;
            }

            // Tentukan class warna untuk JK
            const jkClass = s.jk === 'Putra' ? 'jk-putra' : 'jk-putri';

            container.innerHTML = `
                <a href="anggota.html" class="btn-kembali">⬅ Kembali ke Anggota</a>

                <div class="foto-profil">${s.emoji}</div>

                <h1 class="nama-lengkap">${s.nama}</h1>
                <p class="nama-panggilan">👋 Dipanggil <strong>${s.panggilan}</strong></p>

                <div class="garis"></div>

                <div class="info-grid">

                        <span class="label">👤 Jenis Kelamin</span>
                        <span class="value ${jkClass}">${s.jk}</span>
                    </div>
                    <div class="info-item">
                        <span class="label">🎯 Hobi</span>
                        <span class="value">${s.hobi}</span>
                    </div>
                </div>

                <div class="motto-box">
                    <p class="label">📝 Motto Hidup</p>
                    <p class="motto">"${s.motto}"</p>
                </div>
            `;
        }

        // ===== EKSEKUSI =====
        tampilkanProfil();

</body>
</html>
