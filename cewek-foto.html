<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>Foto Cewek - XI F4</title>
    <style>
        /* ===== RESET ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0c2340, #1a4a7a, #2e6db4);
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* ===== EFK BINTANG ===== */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background:
                radial-gradient(2px 2px at 20px 30px, rgba(255,255,255,0.3), transparent),
                radial-gradient(2px 2px at 40px 70px, rgba(255,255,255,0.2), transparent),
                radial-gradient(2px 2px at 50px 160px, rgba(255,255,255,0.4), transparent),
                radial-gradient(2px 2px at 90px 40px, rgba(255,255,255,0.3), transparent),
                radial-gradient(2px 2px at 130px 80px, rgba(255,255,255,0.2), transparent),
                radial-gradient(2px 2px at 160px 30px, rgba(255,255,255,0.4), transparent);
            background-size: 200px 200px;
            animation: bintang 20s linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes bintang {
            0% { transform: translateY(0); }
            100% { transform: translateY(-200px); }
        }

        /* ===== KONTENER ===== */
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 40px 35px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.5);
            position: relative;
            z-index: 1;
        }

        /* ===== HEADER ===== */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .header h1 {
            color: white;
            font-size: clamp(24px, 4vw, 36px);
            font-weight: 800;
        }

        .header h1 span {
            color: #e74c94;
        }

        .btn-kembali {
            padding: 10px 24px;
            background: rgba(255, 255, 255, 0.12);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-kembali:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-2px);
        }

        /* ===== GALERI ===== */
        .galeri {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .foto-item {
            position: relative;
            border-radius: 16px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.05);
            aspect-ratio: 4/3;
            border: 2px solid rgba(255, 255, 255, 0.08);
            transition: 0.3s;
            cursor: pointer;
        }

        .foto-item:hover {
            transform: scale(1.04);
            border-color: #e74c94;
            box-shadow: 0 10px 35px rgba(231, 76, 148, 0.4);
            z-index: 2;
        }

        .foto-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: 0.3s;
        }

        .foto-item:hover img {
            filter: brightness(1.05);
        }

        /* ===== PLACEHOLDER (kalau foto gak muncul) ===== */
        .foto-item .placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            background: linear-gradient(135deg, rgba(231, 76, 148, 0.2), rgba(231, 76, 148, 0.05));
            color: rgba(255, 255, 255, 0.3);
        }

        /* ===== MODAL FULLSCREEN ===== */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.92);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            padding: 20px;
            animation: fadeIn 0.3s ease;
        }

        .modal.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal img {
            max-width: 100%;
            max-height: 90vh;
            object-fit: contain;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
        }

        .modal-close {
            position: absolute;
            top: 25px;
            right: 35px;
            font-size: 45px;
            color: rgba(255, 255, 255, 0.7);
            cursor: pointer;
            transition: 0.3s;
            background: none;
            border: none;
            font-weight: 300;
        }

        .modal-close:hover {
            color: white;
            transform: rotate(90deg);
        }

        /* ===== INFO ===== */
        .info {
            text-align: center;
            color: rgba(255, 255, 255, 0.3);
            font-size: 13px;
            margin-top: 25px;
            letter-spacing: 1px;
        }

        .info span {
            color: #e74c94;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 600px) {
            .container {
                padding: 25px 18px;
                border-radius: 28px;
            }

            .header {
                flex-direction: column;
                text-align: center;
            }

            .galeri {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            .foto-item .placeholder {
                font-size: 40px;
            }

            .modal-close {
                top: 15px;
                right: 20px;
                font-size: 35px;
            }
        }

        @media (max-width: 400px) {
            .container {
                padding: 18px 12px;
                border-radius: 20px;
            }

            .galeri {
                gap: 12px;
            }
        }

        /* Landscape HP */
        @media (max-height: 500px) and (orientation: landscape) {
            .container {
                padding: 18px 25px;
                border-radius: 24px;
            }

            .header {
                margin-bottom: 15px;
            }

            .header h1 {
                font-size: 20px;
            }

            .galeri {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }

            .foto-item {
                aspect-ratio: 4/3;
            }

            .foto-item .placeholder {
                font-size: 30px;
            }

            .info {
                margin-top: 12px;
                font-size: 11px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- ===== HEADER ===== -->
        <div class="header">
            <h1>📸 <span>Foto</span> Cewek</h1>
            <a href="cewek.html" class="btn-kembali">⬅ Kembali</a>
        </div>

        <!-- ===== GALERI FOTO ===== -->
        <div class="galeri" id="galeriFoto">
            <!-- Data akan diisi oleh JavaScript -->
        </div>

        <p class="info">✨ Koleksi foto <span>cewek</span> XI F4 ✨</p>
    </div>

    <!-- ===== MODAL FULLSCREEN ===== -->
    <div class="modal" id="modalFoto" onclick="tutupModal()">
        <button class="modal-close" onclick="tutupModal()">✕</button>
        <img id="modalImg" src="" alt="Foto Fullscreen" />
    </div>

    <script>
        // ===== DATA FOTO CEWEK =====
        // Ganti 'src' dengan nama file foto kamu
        const fotoCewek = [
            { src: 'cewek1.jpg', alt: 'Foto cewek 1' },
            { src: 'cewek2.jpg', alt: 'Foto cewek 2' }
        ];

        // ===== TAMPILKAN FOTO =====
        function tampilkanFoto() {
            const container = document.getElementById('galeriFoto');
            let html = '';

            fotoCewek.forEach((foto, index) => {
                html += `
                    <div class="foto-item" onclick="bukaModal('${foto.src}')">
                        <img src="${foto.src}" alt="${foto.alt}" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'" />
                        <div class="placeholder" style="display:none;">👧</div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        // ===== MODAL FULLSCREEN =====
        function bukaModal(src) {
            const modal = document.getElementById('modalFoto');
            const img = document.getElementById('modalImg');
            img.src = src;
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function tutupModal() {
            const modal = document.getElementById('modalFoto');
            modal.classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        // Tutup modal dengan tombol ESC
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                tutupModal();
            }
        });

        // ===== EKSEKUSI =====
        tampilkanFoto();
    </script>

</body>
</html>
