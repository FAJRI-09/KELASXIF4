<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>XI F4 - SMAN 2 Enok</title>
    <style>
        /* ===== RESET ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0c2340, #1a4a7a, #2e6db4);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
            position: relative;
            overflow-x: hidden;
        }

        /* ===== EFK BINTANG ===== */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background:
                radial-gradient(2px 2px at 20px 30px, rgba(255,255,255,0.3), transparent),
                radial-gradient(2px 2px at 40px 70px, rgba(255,255,255,0.2), transparent),
                radial-gradient(2px 2px at 50px 160px, rgba(255,255,255,0.4), transparent),
                radial-gradient(2px 2px at 90px 40px, rgba(255,255,255,0.3), transparent),
                radial-gradient(2px 2px at 130px 80px, rgba(255,255,255,0.2), transparent),
                radial-gradient(2px 2px at 160px 30px, rgba(255,255,255,0.4), transparent);
            background-size: 200px 200px;
            animation: bintang 20s linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes bintang {
            0% { transform: translateY(0); }
            100% { transform: translateY(-200px); }
        }

        /* ===== KARTU UTAMA ===== */
        .container {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: clamp(30px, 6vw, 60px);
            max-width: 750px;
            width: 100%;
            text-align: center;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.15);
            position: relative;
            z-index: 1;
        }

        /* ===== LOGO ===== */
        .logo {
            width: clamp(120px, 25vw, 180px);
            height: clamp(120px, 25vw, 180px);
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            margin-bottom: clamp(12px, 2vw, 20px);
            transition: 0.3s;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        .logo:hover {
            transform: scale(1.05);
            border-color: rgba(255, 255, 255, 0.6);
        }

        /* ===== TEKS ===== */
        .judul {
            color: white;
            font-size: clamp(24px, 5vw, 42px);
            font-weight: 800;
            letter-spacing: 2px;
            text-shadow: 0 2px 20px rgba(0, 0, 0, 0.3);
            line-height: 1.2;
            word-break: break-word;
        }

        .subjudul {
            color: rgba(255, 255, 255, 0.85);
            font-size: clamp(16px, 3vw, 26px);
            font-weight: 300;
            letter-spacing: clamp(3px, 1vw, 8px);
            margin-top: 4px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
            word-break: break-word;
        }

        .garis {
            width: clamp(60px, 10vw, 100px);
            height: 3px;
            background: linear-gradient(90deg, transparent, #fdcb6e, transparent);
            margin: clamp(14px, 2vw, 22px) auto;
            border-radius: 10px;
        }

        /* ===== TOMBOL ===== */
        .tombol-group {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: clamp(10px, 1.5vw, 16px);
            margin-top: clamp(20px, 3vw, 34px);
        }

        .tombol {
            padding: clamp(14px, 2vw, 20px) clamp(12px, 1.5vw, 24px);
            border: none;
            border-radius: clamp(14px, 1.5vw, 20px);
            font-size: clamp(14px, 2vw, 20px);
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: clamp(6px, 1vw, 12px);
            background: rgba(255, 255, 255, 0.12);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            text-decoration: none;
            min-height: clamp(50px, 8vw, 70px);
            width: 100%;
        }

        .tombol:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.25);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.3);
            border-color: rgba(255, 255, 255, 0.4);
        }

        .tombol:active {
            transform: translateY(-2px) scale(0.97);
        }

        .tombol.anggota {
            grid-column: span 2;
            background: rgba(253, 203, 110, 0.2);
            border-color: rgba(253, 203, 110, 0.3);
            font-size: clamp(16px, 2.2vw, 22px);
            padding: clamp(16px, 2vw, 22px);
        }

        .tombol.anggota:hover {
            background: rgba(253, 203, 110, 0.35);
            border-color: #fdcb6e;
        }

        .tombol.cowok:hover {
            background: rgba(74, 144, 217, 0.35);
            border-color: #4a90d9;
        }

        .tombol.cewek:hover {
            background: rgba(231, 76, 148, 0.35);
            border-color: #e74c94;
        }

        .tombol.bareng:hover {
            background: rgba(46, 204, 113, 0.35);
            border-color: #2ecc71;
        }

        .icon {
            font-size: clamp(18px, 2.5vw, 28px);
        }

        /* ===== FOOTER ===== */
        .footer {
            margin-top: clamp(20px, 3vw, 34px);
            color: rgba(255, 255, 255, 0.3);
            font-size: clamp(11px, 1.2vw, 14px);
            letter-spacing: 1px;
        }

        /* ===== RESPONSIVE ===== */
        /* HP kecil (di bawah 480px) */
        @media (max-width: 480px) {
            body {
                padding: 10px;
                align-items: center;
            }

            .container {
                padding: 25px 18px;
                border-radius: 28px;
            }

            .tombol-group {
                grid-template-columns: 1fr 1fr;
                gap: 10px;
            }

            .tombol.anggota {
                grid-column: span 2;
            }
        }

        /* HP sangat kecil (di bawah 380px) */
        @media (max-width: 380px) {
            .container {
                padding: 20px 14px;
                border-radius: 22px;
            }

            .tombol-group {
                grid-template-columns: 1fr;
                gap: 10px;
            }

            .tombol.anggota {
                grid-column: span 1;
            }

            .tombol {
                padding: 14px;
                font-size: 15px;
                min-height: 48px;
            }
        }

        /* Landscape HP (miring) */
        @media (max-height: 500px) and (orientation: landscape) {
            body {
                padding: 10px 20px;
                align-items: center;
            }

            .container {
                padding: 20px 30px;
                border-radius: 24px;
                max-width: 600px;
            }

            .logo {
                width: 80px;
                height: 80px;
                margin-bottom: 10px;
            }

            .judul {
                font-size: 20px;
            }

            .subjudul {
                font-size: 14px;
                letter-spacing: 3px;
            }

            .garis {
                margin: 8px auto;
                width: 50px;
            }

            .tombol-group {
                margin-top: 14px;
                gap: 8px;
            }

            .tombol {
                padding: 10px 14px;
                font-size: 13px;
                min-height: 40px;
            }

            .tombol.anggota {
                padding: 12px;
                font-size: 14px;
            }

            .icon {
                font-size: 16px;
            }

            .footer {
                margin-top: 12px;
                font-size: 10px;
            }
        }

        /* Tablet */
        @media (min-width: 768px) and (max-width: 1024px) {
            .container {
                max-width: 550px;
                padding: 45px 50px;
            }

            .logo {
                width: 150px;
                height: 150px;
            }
        }

        /* Komputer / Layar besar */
        @media (min-width: 1025px) {
            .container {
                max-width: 750px;
                padding: 55px 65px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- ===== LOGO ===== -->
        <img src="logoutama.jpg" alt="Logo Kelas" class="logo" />

        <!-- ===== TEKS ===== -->
        <h1 class="judul">SMAN 2 ENOK</h1>
        <p class="subjudul">XI F4</p>
        <div class="garis"></div>

        <!-- ===== TOMBOL ===== -->
        <div class="tombol-group">
            <a href="anggota.html" class="tombol anggota">
                <span class="icon">👥</span> Anggota
            </a>
            <a href="cowok.html" class="tombol cowok">
                <span class="icon">👦</span> Cowok
            </a>
            <a href="cewek.html" class="tombol cewek">
                <span class="icon">👧</span> Cewek
            </a>
            <a href="bareng.html" class="tombol bareng">
                <span class="icon">👫</span> Bareng
            </a>
        </div>

        <p class="footer">✨ Kelas XI F4 ✨</p>
    </div>

</body>
</html>
